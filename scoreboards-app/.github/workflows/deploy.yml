name: Deploy Frontend to S3 (production)

on:
  push:
    branches: ["production"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_AUTH_DOMAIN: ${{ secrets.VITE_AUTH_DOMAIN }}
          VITE_AUTH_CLIENT_ID: ${{ secrets.VITE_AUTH_CLIENT_ID }}
          VITE_AUTH_AUDIENCE: ${{ secrets.VITE_AUTH_AUDIENCE }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          # Create a temporary .env for the build (single-env-file workflow)
          cat > .env << 'EOF'
          VITE_AUTH_DOMAIN=${VITE_AUTH_DOMAIN}
          VITE_AUTH_CLIENT_ID=${VITE_AUTH_CLIENT_ID}
          VITE_AUTH_AUDIENCE=${VITE_AUTH_AUDIENCE}
          VITE_API_URL=${VITE_API_URL}
          EOF
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync dist to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --cache-control "max-age=31536000,public" \
            --exclude "index.html" \
            --exclude "*.html"

          # index.html should be fresh on each deploy (SPA entrypoint)
          aws s3 cp dist/index.html s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
            --cache-control "no-cache,max-age=0,must-revalidate"